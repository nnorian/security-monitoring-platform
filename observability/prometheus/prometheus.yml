global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'log-collector'
    static_configs:
      - targets: ['log-collector:8080']
    metrics_path: '/metrics'

  - job_name: 'alert-manager'
    static_configs:
      - targets: ['alert-manager:8080']

  - job_name: 'threat-intel'
    static_configs:
      - targets: ['threat-intel:8080']