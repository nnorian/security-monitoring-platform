services:

  log-collector:
    build: ./services/LogCollector
    ports:
      - "5002:8080"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
    depends_on:
      - rabbitmq
      - redis

  alert-manager:
    build: ./services/AlertManager
    ports: 
      - "5003:8080"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
    depends_on:
      - rabbitmq
      - redis

  threat-intel:
    build: ./services/ThreatIntel
    ports:
      - "8004:8080"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
    - "5672:5672" #amqp
    - "15672:15672" #management ui
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: